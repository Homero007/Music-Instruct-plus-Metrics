[project]
name = "music-transformation-system"
version = "0.1.0"
description = "Modular music transformation system with audio projects, async jobs, stems, MIDI layers, features, latent embeddings, and render pipelines."
requires-python = ">=3.11,<3.15"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "pydantic>=2.7",
  "python-multipart>=0.0.9",
  "typer>=0.12",
  "celery>=5.4",
  "redis>=5.0",
  "numpy>=1.26",
  "soundfile>=0.12",
  "librosa>=0.10",
  "mido>=1.3",
]

[project.optional-dependencies]
audio = [
  "pyloudnorm>=0.1",
  "demucs>=4.0",
  "torchcodec>=0.13",
  "basic-pitch>=0.4; python_version < '3.12'",
  "pedalboard>=0.9",
]
ml = [
  "torch>=2.3",
  "lightning>=2.2",
  "miditok>=3.0",
  "pretty_midi>=0.2",
  "miditoolkit>=1.0",
  "transformers>=4.38.0",
]
dev = [
  "pytest>=8.2",
  "ruff>=0.6",
]

[project.scripts]
hybrid-engine = "hybrid_music_engine.cli.main:app"

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["hybrid_music_engine*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"
